<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contec - Administração de Usuários</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Cabeçalho -->
        <header>
            <div class="logo-wrapper">
                <div class="logo-square"></div>
                <div class="logo-text">CONTEC</div>
            </div>
            <div class="page-title">Administração de Usuários</div>
        </header>

        <!-- Menu Lateral -->
        <nav class="sidebar">
            <div class="menu-items">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-arrow-left menu-icon"></i>Voltar</a></li>
                </ul>
            </div>
        </nav>

        <!-- Conteúdo Principal -->
        <main class="content">
            <div class="admin-actions">
                <button id="addUserBtn" class="action-button">
                    <i class="fas fa-user-plus"></i> Novo Usuário
                </button>
            </div>

            <div class="dashboard-content">
                <div class="users-table-container">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>Usuário</th>
                                <th>Nome</th>
                                <th>Grupo</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Dados serão inseridos via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Adicionar/Editar Usuário -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Novo Usuário</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="userForm">
                <div class="form-group">
                    <label for="username">Usuário:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="fullName">Nome Completo:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="group">Grupo:</label>
                    <select id="group" name="group" required>
                        <option value="">Selecione um grupo</option>
                        <option value="admin">Administrador</option>
                        <option value="instalacao">Instalação</option>
                        <option value="vendas">Vendas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Status:</label>
                    <select id="status" name="status" required>
                        <option value="active">Ativo</option>
                        <option value="inactive">Inativo</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="save-button">Salvar</button>
                    <button type="button" class="cancel-button">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
